# SOLUTION — application.properties for H2 In-Memory Configuration
# File location: src/main/resources/application.properties

# ─── Part (a): In-memory database ─────────────────────────────────────────────
# jdbc:h2:mem:testdb = "connect to H2 in in-memory mode, database named testdb"
# mem: is the magic keyword — it means the DB lives only in RAM.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── Part (b): Auto-create / update tables ────────────────────────────────────
# update = create missing tables and columns, but NEVER drop existing data.
# EXAM: This is the correct choice for quizzes. Never use 'create' or 'create-drop'.
spring.jpa.hibernate.ddl-auto=update

# ─── Part (c): Print SQL to console ──────────────────────────────────────────
# show-sql=true prints every INSERT/SELECT/UPDATE/DELETE Hibernate runs.
spring.jpa.show-sql=true
# format_sql=true makes the SQL human-readable (multi-line, indented).
spring.jpa.properties.hibernate.format_sql=true

# ─── Part (d): H2 console at /h2-console ─────────────────────────────────────
# enabled=true opens a browser SQL client at http://localhost:8080/h2-console
# Use JDBC URL = jdbc:h2:mem:testdb, username=sa, password= to log in.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
