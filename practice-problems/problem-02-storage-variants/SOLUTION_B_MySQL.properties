# SOLUTION VARIANT B — MySQL Database
# File location: src/main/resources/application.properties
#
# Prerequisites before running:
#   1. MySQL is running on localhost:3306
#   2. You ran: CREATE DATABASE school; in MySQL
#   3. mysql-connector-j is added to pom.xml (see below)
#
# pom.xml addition needed:
#   <dependency>
#       <groupId>com.mysql</groupId>
#       <artifactId>mysql-connector-j</artifactId>
#       <scope>runtime</scope>
#   </dependency>

# jdbc:mysql://HOST:PORT/DATABASE?serverTimezone=UTC
#   jdbc:mysql:// = MySQL JDBC protocol
#   localhost:3306 = MySQL running on local machine, default port
#   school = database (schema) name — must already exist in MySQL
#   ?serverTimezone=UTC = prevents timezone-related startup errors
spring.datasource.url=jdbc:mysql://localhost:3306/school?serverTimezone=UTC

# MySQL Connector/J 8.x driver. The 'cj' = Connector/J (the official MySQL JDBC driver).
# EXAM: Do NOT use the old com.mysql.jdbc.Driver — it's deprecated and removed in newer versions.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Your MySQL username and password.
# Replace with your actual credentials if different.
spring.datasource.username=root
spring.datasource.password=root

# update is safe — creates missing tables without dropping existing data.
# EXAM: Never use create-drop with MySQL in a real environment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: explicitly specify MySQL 8 dialect (Spring Boot 3 auto-detects this).
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
