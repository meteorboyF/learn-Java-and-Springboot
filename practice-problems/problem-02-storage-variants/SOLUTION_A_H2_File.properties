# SOLUTION VARIANT A — H2 File-Based Database
# File location: src/main/resources/application.properties
#
# Use when: You want data to survive restarts without setting up a real database server.
# How it works: H2 writes its data to a .mv.db file on your hard drive.
#               The data persists between app restarts — unlike in-memory mode.

# jdbc:h2:file:./data/schooldb
#   file: = file-based mode (not mem:)
#   ./data/ = relative path from where the JAR is run (usually the project root)
#   schooldb = the name of the database file (creates schooldb.mv.db in ./data/)
spring.datasource.url=jdbc:h2:file:./data/schooldb

# Same H2 driver as in-memory — still H2, just stored on disk.
spring.datasource.driver-class-name=org.h2.Driver

# Same H2 credentials — sa with empty password.
spring.datasource.username=sa
spring.datasource.password=

# update: safe for persistent storage — won't drop existing data on restart.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console still works with file mode.
# Use JDBC URL: jdbc:h2:file:./data/schooldb (must match the datasource URL above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
