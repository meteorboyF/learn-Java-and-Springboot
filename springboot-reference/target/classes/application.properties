# =============================================================================
# application.properties — Spring Boot's main configuration file.
# Every key=value pair here changes how your app behaves.
# Spring Boot reads this file automatically on startup — you never load it manually.
# Location: src/main/resources/application.properties (MUST be this exact path)
# =============================================================================

# =============================================================================
# BLOCK 1: H2 IN-MEMORY DATABASE (ACTIVE — uncommented)
# Use when: Running locally for development or taking a lab quiz.
# Pros: Zero setup, starts instantly, no external database server needed.
# Cons: ALL DATA IS LOST when the app stops. Every restart = empty database.
# EXAM: This is the standard quiz setup. Know every property below.
# =============================================================================

# The JDBC URL tells Spring WHERE the database is.
# jdbc:h2:mem:testdb = "connect to H2, in-memory mode, database named testdb"
# 'testdb' is just a name — you can call it anything.
# EXAM: mem: = in-memory (data lost on restart). file: = persists to disk.
spring.datasource.url=jdbc:h2:mem:testdb

# The JDBC driver class. Spring Boot can often auto-detect this from the URL,
# but being explicit is safer and makes your intent clear to readers.
spring.datasource.driver-class-name=org.h2.Driver

# H2's default username is 'sa' (System Administrator). Always use this for H2.
spring.datasource.username=sa

# H2's default password is an EMPTY STRING — not null, not "null", just empty.
# EXAM: Leaving this blank is correct. Writing password=null will cause an error.
spring.datasource.password=

# ddl-auto tells Hibernate what to do with the database schema on startup.
# Options:
#   none        — do nothing (use for production with a managed schema)
#   validate    — check that the DB matches your entities, crash if it doesn't
#   update      — CREATE missing tables/columns, NEVER drop existing data (safe for dev)
#   create      — DROP and re-CREATE all tables on every startup (data loss!)
#   create-drop — DROP everything when the app shuts down (good for tests)
# EXAM: Use 'update' for quizzes. Never use 'create' or 'create-drop' in production.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true prints every SQL statement Hibernate generates to the console.
# Invaluable for seeing what INSERT/SELECT/UPDATE actually runs.
# EXAM: Enable this during development so you can debug unexpected queries.
spring.jpa.show-sql=true

# format_sql=true makes the SQL output multi-line and readable (pretty-printed).
# Without this, you get one long unreadable line per query.
spring.jpa.properties.hibernate.format_sql=true

# H2 Console: a browser-based SQL client built into H2.
# After starting the app, go to http://localhost:8080/h2-console
# Use JDBC URL = jdbc:h2:mem:testdb, username=sa, password= (empty) to log in.
# EXAM: Enabled here so you can inspect tables manually during development.
spring.h2.console.enabled=true

# The URL path where the H2 console is served.
# Default is already /h2-console, but being explicit is good practice.
spring.h2.console.path=/h2-console


# =============================================================================
# BLOCK 2: H2 FILE-BASED DATABASE (commented out)
# Use when: You want data to SURVIVE restarts without running a real DB server.
# Pros: Persists to disk, easy to inspect the .mv.db file, no external server.
# Cons: Still H2 dialect (not MySQL), doesn't simulate a production database.
# How to activate: Comment out Block 1 above, then uncomment these lines.
# =============================================================================

# spring.datasource.url=jdbc:h2:file:./data/schooldb
# Explanation: 'file:' = file-based mode. './data/schooldb' = relative path.
# Spring Boot creates a file called schooldb.mv.db in the data/ folder.
# The data/ folder is created automatically if it doesn't exist.

# spring.datasource.driver-class-name=org.h2.Driver
# Same driver as in-memory — still H2, just stored on disk.

# spring.datasource.username=sa
# spring.datasource.password=
# Same credentials as in-memory H2.

# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# H2 console still works with file mode — use the same file URL to log in:
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console


# =============================================================================
# BLOCK 3: MYSQL DATABASE (commented out)
# Use when: Running the app against a real MySQL database server.
# Pros: Production-grade, real SQL dialect, data always persists.
# Cons: You must have MySQL running, create the database first, add the driver dep.
# How to activate:
#   1. Comment out Block 1 above.
#   2. Uncomment these lines.
#   3. Add mysql-connector-j to pom.xml (see the commented dependency there).
#   4. Run: CREATE DATABASE school; in MySQL first.
# EXAM: The @Entity, @Repository, @Service code is IDENTICAL — only this file changes.
# =============================================================================

# spring.datasource.url=jdbc:mysql://localhost:3306/school?serverTimezone=UTC
# Format: jdbc:mysql://HOST:PORT/DATABASE_NAME?serverTimezone=UTC
# The ?serverTimezone=UTC prevents timezone-related errors on some systems.

# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Use the 'cj' (Connector/J) driver. The old com.mysql.jdbc.Driver is deprecated.

# spring.datasource.username=root
# spring.datasource.password=root
# Replace with your actual MySQL credentials.

# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# MySQL dialect (optional in Spring Boot 3 — auto-detected, but explicit is safer):
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# =============================================================================
# SERVER CONFIGURATION (applies to all storage variants)
# =============================================================================

# The port your app listens on. Default is 8080.
# Change this if port 8080 is already in use on your machine.
# server.port=8080

# Application name — used in logs and Spring Cloud service discovery.
spring.application.name=springboot-reference
